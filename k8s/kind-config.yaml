# Kind cluster configuration for local development on Mac M1
# Minimal single node cluster - maximum compatibility
# Uses Kubernetes v1.25.11 (proven stable for ARM64)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: unesco-rdm

# Single node configuration (control-plane only)
nodes:
  - role: control-plane
    # Use older stable version known to work on Mac M1
    image: kindest/node:v1.25.11

    # Port mappings for accessing services via Ingress
    extraPortMappings:
      # HTTP
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # HTTPS
      - containerPort: 30443
        hostPort: 443
        protocol: TCP

    # Minimal kubeadm config to avoid issues
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
