# Minimal InvenioRDM configuration for Kind
# Uses standard Docker images that should work better in local environment

# Image configuration
image:
  repository: sc-openscience
  tag: latest
  pullPolicy: Never

# Invenio configuration
invenio:
  hostname: localhost
  existingSecret: unesco-rdm-secrets

# Scaling - minimal for local
replicaCount:
  web: 1
  worker: 1
  beat: 1

# Disable complex services that are causing issues
opensearch:
  enabled: false

# Use external OpenSearch configuration (even though we're not using it)
opensearchExternal:
  hostname: "localhost"
  port: 9200
  username: ""
  password: ""

# Simplified PostgreSQL
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "13-alpine"
  auth:
    username: invenio
    password: invenio123
    database: invenio
  primary:
    persistence:
      enabled: false # Disable persistence for now

# Simplified Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Simplified RabbitMQ
rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: "3.12-alpine"
  auth:
    username: invenio
    password: invenio123
  persistence:
    enabled: false

# Ingress
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

# Resources - minimal
resources:
  web:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m
  worker:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
