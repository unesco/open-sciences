# UNESCO InvenioRDM - Helm Values Override for Kind Cluster
# External services deployment with public images

global:
  timezone: Europe/Rome

invenio:
  hostname: localhost:8080
  init: true
  demo_data: false
  default_users:
    "user@demo.org": "demo123"
  extraConfig:
    INVENIO_SITE_UI_URL: "http://localhost:8080"
    INVENIO_SITE_API_URL: "http://localhost:8080/api"
    INVENIO_APP_ENABLE_SECURE_HEADERS: "False"
    INVENIO_REQUIRE_HTTPS: "False"
    SESSION_COOKIE_SECURE: "False"
    PERMANENT_SESSION_LIFETIME: "31536000"

image:
  registry: "docker.io"
  repository: sc-openscience
  tag: latest
  pullPolicy: Never

web:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  startupProbe: null # Disabilitata: l'app impiega troppo tempo a caricarsi in Kind
  readinessProbe: null # Disabilitata temporaneamente per debugging

worker:
  enabled: true
  replicas: 2
  app: "invenio_app.celery"
  concurrency: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  livenessProbe: null # Disabilitata per evitare restart inutili
  readinessProbe: null

workerBeat:
  enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  livenessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - celery -A invenio_app.celery inspect ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 60
    failureThreshold: 5

# Flower - disabled
flower:
  enabled: false

# Redis configuration - DISABLED, using external service
redis:
  enabled: false

redisExternal:
  hostname: "redis"

# RabbitMQ configuration - DISABLED, using external service
rabbitmq:
  enabled: false

rabbitmqExternal:
  username: "guest"
  password: "guest"
  hostname: "rabbitmq"
  amqpPort: 5672
  managementPort: 15672
  protocol: "amqp"
  vhost: "/"

# PostgreSQL configuration - DISABLED, using external service
postgresql:
  enabled: false

postgresqlExternal:
  hostname: "postgresql"
  port: 5432
  username: "unesco_rdm"
  password: "unesco_rdm_password"
  database: "unesco_rdm"

# OpenSearch configuration - DISABLED, using external service
opensearch:
  enabled: false

opensearchExternal:
  hostname: "opensearch"

# Nginx configuration
nginx:
  image: "nginx:1.25-alpine"

# Persistence for file storage (disabled for Kind)
persistence:
  enabled: false
