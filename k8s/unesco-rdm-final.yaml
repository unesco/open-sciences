---
apiVersion: v1
kind: Namespace
metadata:
  name: unesco-rdm
---
# Redis - Single instance for development
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: unesco-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            [
              "redis-server",
              "--appendonly",
              "yes",
              "--maxmemory",
              "512mb",
              "--maxmemory-policy",
              "allkeys-lru",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: unesco-rdm
spec:
  selector:
    app: redis
  ports:
    - port: 6379
---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: unesco-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: "unesco_rdm"
            - name: POSTGRES_USER
              value: "unesco_rdm"
            - name: POSTGRES_PASSWORD
              value: "unesco_rdm_password"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: unesco-rdm
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
---
# OpenSearch
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: unesco-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.11.1
          env:
            - name: discovery.type
              value: "single-node"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: unesco-rdm
spec:
  selector:
    app: opensearch
  ports:
    - port: 9200
---
# RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: unesco-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: unesco-rdm
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
    - name: management
      port: 15672
---
# UNESCO RDM Web + Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: unesco-rdm-init
  namespace: unesco-rdm
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-services
          image: busybox:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for services..."
              until nc -z postgresql 5432 && nc -z redis 6379 && nc -z opensearch 9200 && nc -z rabbitmq 5672; do
                sleep 2
              done
              echo "All services ready!"
      containers:
        - name: init
          image: sc-openscience:latest
          imagePullPolicy: Never
          env:
            - name: INVENIO_INSTANCE_PATH
              value: "/opt/invenio/var/instance"
            - name: INVENIO_SQLALCHEMY_DATABASE_URI
              value: "postgresql://unesco_rdm:unesco_rdm_password@postgresql:5432/unesco_rdm"
            - name: INVENIO_CACHE_REDIS_URL
              value: "redis://redis:6379/0"
            - name: INVENIO_ACCOUNTS_SESSION_REDIS_URL
              value: "redis://redis:6379/1"
            - name: INVENIO_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
            - name: INVENIO_SEARCH_HOSTS
              value: '[{"host": "opensearch", "port": 9200}]'
            - name: INVENIO_SECRET_KEY
              value: "CHANGE-ME-IN-PRODUCTION"
            - name: INVENIO_SECURITY_PASSWORD_SALT
              value: "CHANGE-ME-IN-PRODUCTION"
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "🚀 Initializing UNESCO InvenioRDM database and search..."

              # Setup instance
              mkdir -p /opt/invenio/var/instance
              cp /opt/invenio/src/invenio.cfg /opt/invenio/var/instance/ || true

              # Initialize
              invenio db init create
              invenio index init --force
              invenio files location create --default 'default-location' /opt/invenio/var/instance/data || true
              invenio roles create admin || true
              invenio access allow superuser-access role admin || true

              # Create user
              invenio users create user@demo.org --password=demo123 --active || true
              invenio roles add user@demo.org admin || true

              # Create token
              invenio tokens create -n api-token -u user@demo.org || true

              echo "✅ Initialization complete!"
---
# Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unesco-rdm-web
  namespace: unesco-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unesco-rdm-web
  template:
    metadata:
      labels:
        app: unesco-rdm-web
    spec:
      initContainers:
        - name: wait-for-init
          image: busybox:latest
          command:
            [
              "sh",
              "-c",
              "until kubectl get job unesco-rdm-init -n unesco-rdm -o jsonpath='{.status.succeeded}' | grep -q 1; do echo 'Waiting for init job...'; sleep 5; done || sleep 30",
            ]
      containers:
        - name: web
          image: sc-openscience:latest
          imagePullPolicy: Never
          env:
            - name: INVENIO_INSTANCE_PATH
              value: "/opt/invenio/var/instance"
            - name: INVENIO_SQLALCHEMY_DATABASE_URI
              value: "postgresql://unesco_rdm:unesco_rdm_password@postgresql:5432/unesco_rdm"
            - name: INVENIO_CACHE_REDIS_URL
              value: "redis://redis:6379/0"
            - name: INVENIO_ACCOUNTS_SESSION_REDIS_URL
              value: "redis://redis:6379/1"
            - name: INVENIO_COMMUNITIES_IDENTITIES_CACHE_REDIS_URL
              value: "redis://redis:6379/4"
            - name: INVENIO_RATELIMIT_STORAGE_URI
              value: "redis://redis:6379/3"
            - name: INVENIO_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
            - name: INVENIO_SEARCH_HOSTS
              value: '[{"host": "opensearch", "port": 9200}]'
            - name: INVENIO_SECRET_KEY
              value: "CHANGE-ME-IN-PRODUCTION"
            - name: INVENIO_SECURITY_PASSWORD_SALT
              value: "CHANGE-ME-IN-PRODUCTION"
          ports:
            - containerPort: 5000
          command: ["bash", "-c"]
          args:
            - |
              mkdir -p /opt/invenio/var/instance
              cp /opt/invenio/src/invenio.cfg /opt/invenio/var/instance/ || true
              cp -r /opt/invenio/src/templates /opt/invenio/var/instance/ || true
              cp -r /opt/invenio/src/static /opt/invenio/var/instance/ || true

              # Build assets only once
              if [ ! -d "/opt/invenio/var/instance/static/dist" ]; then
                invenio collect -v
                cp -r /opt/invenio/src/assets /opt/invenio/var/instance/ || true
                invenio webpack buildall
              fi

              invenio run --host=0.0.0.0 --port=5000
---
apiVersion: v1
kind: Service
metadata:
  name: unesco-rdm-web
  namespace: unesco-rdm
spec:
  selector:
    app: unesco-rdm-web
  ports:
    - port: 5000
---
# Celery Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unesco-rdm-worker
  namespace: unesco-rdm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unesco-rdm-worker
  template:
    metadata:
      labels:
        app: unesco-rdm-worker
    spec:
      containers:
        - name: worker
          image: sc-openscience:latest
          imagePullPolicy: Never
          env:
            - name: INVENIO_INSTANCE_PATH
              value: "/opt/invenio/var/instance"
            - name: INVENIO_SQLALCHEMY_DATABASE_URI
              value: "postgresql://unesco_rdm:unesco_rdm_password@postgresql:5432/unesco_rdm"
            - name: INVENIO_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_BROKER_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENIO_CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
            - name: INVENIO_SEARCH_HOSTS
              value: '[{"host": "opensearch", "port": 9200}]'
            - name: C_FORCE_ROOT
              value: "true"
          command: ["bash", "-c"]
          args:
            - |
              mkdir -p /opt/invenio/var/instance
              cp /opt/invenio/src/invenio.cfg /opt/invenio/var/instance/ || true
              exec celery -A invenio_app.celery worker --loglevel=INFO --concurrency=2
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unesco-rdm-ingress
  namespace: unesco-rdm
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unesco-rdm-web
                port:
                  number: 5000
