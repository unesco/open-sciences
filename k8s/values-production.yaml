# UNESCO Science Portal - Helm Values
# Custom configuration for InvenioRDM deployment on Kubernetes
#
# Usage:
#   helm install unesco-rdm invenio/invenio -f k8s/values-production.yaml
#
# References:
#   - https://github.com/inveniosoftware/helm-invenio
#   - https://inveniordm.docs.cern.ch/

# ============================================================================
# IMAGE CONFIGURATION
# ============================================================================

image:
  # Docker image repository
  repository: registry.example.com/unesco/sc-openscience

  # Image tag (use semantic versioning)
  tag: "latest"

  # Pull policy
  # Always: always pull image (useful for 'latest' tag)
  # IfNotPresent: pull only if not cached locally
  pullPolicy: Always

# Docker registry credentials
imagePullSecrets:
  - name: registry-credentials

# ============================================================================
# SCALING CONFIGURATION
# ============================================================================

# Number of replicas for each component
replicaCount:
  # Web UI pods (user interface)
  web-ui: 2

  # Web API pods (REST API)
  web-api: 2

  # Celery workers (background tasks)
  worker: 3

  # Celery beat scheduler (only 1 needed)
  scheduler: 1

# ============================================================================
# RESOURCE LIMITS
# ============================================================================

resources:
  # Web UI resources
  web-ui:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # Web API resources
  web-api:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # Worker resources
  worker:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Scheduler resources
  scheduler:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

# ============================================================================
# INGRESS CONFIGURATION
# ============================================================================

ingress:
  enabled: true

  # Ingress class (nginx, traefik, etc.)
  className: nginx

  # Annotations for ingress
  annotations:
    # SSL certificate issuer (cert-manager)
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Max upload size (adjust for your needs)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # Rate limiting (optional)
    # nginx.ingress.kubernetes.io/limit-rps: "10"

  # Hosts configuration
  hosts:
    - host: openscience.unesco.org
      paths:
        - path: /
          pathType: Prefix

  # TLS configuration
  tls:
    - secretName: unesco-rdm-tls
      hosts:
        - openscience.unesco.org

# ============================================================================
# POSTGRESQL DATABASE
# ============================================================================

postgresql:
  enabled: true

  # Authentication
  auth:
    username: invenio
    password: "CHANGEME" # ⚠️ Use Kubernetes Secret in production!
    database: invenio

  # Architecture (standalone or replication)
  architecture: standalone

  # Primary instance configuration
  primary:
    # Persistence
    persistence:
      enabled: true
      size: 50Gi
      storageClass: standard-rwo # Adjust to your storage class

    # Resources
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

    # PostgreSQL configuration
    postgresql:
      max_connections: 200
      shared_buffers: 512MB
      effective_cache_size: 2GB
      maintenance_work_mem: 128MB
      checkpoint_completion_target: 0.9

  # Backup configuration (optional)
  backup:
    enabled: false
    # cronjob schedule
    schedule: "0 2 * * *"

# ============================================================================
# OPENSEARCH (Search Engine)
# ============================================================================

opensearch:
  enabled: true

  # Cluster name
  clusterName: unesco-search

  # Number of replicas (3 for production HA)
  replicas: 3

  # Persistence
  persistence:
    enabled: true
    size: 100Gi
    storageClass: standard-rwo

  # Resources
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  # JVM heap size (50-75% of memory limit)
  opensearchJavaOpts: "-Xms2g -Xmx2g"

  # Security
  securityConfig:
    enabled: true
    # TLS disabled for internal cluster communication
    internalUsersSecret: opensearch-users

  # Plugins (optional)
  plugins:
    enabled: []

# ============================================================================
# REDIS (Cache)
# ============================================================================

redis:
  enabled: true

  # Architecture (standalone or replication)
  architecture: standalone

  # Authentication
  auth:
    enabled: true
    password: "CHANGEME" # ⚠️ Use Kubernetes Secret in production!

  # Master configuration
  master:
    # Persistence (not needed for cache)
    persistence:
      enabled: false

    # Resources
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# ============================================================================
# RABBITMQ (Message Queue)
# ============================================================================

rabbitmq:
  enabled: true

  # Authentication
  auth:
    username: invenio
    password: "CHANGEME" # ⚠️ Use Kubernetes Secret in production!
    erlangCookie: "RANDOM_ERLANG_COOKIE"

  # Clustering (optional for HA)
  clustering:
    enabled: false
    replicaCount: 1

  # Persistence
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo

  # Resources
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Plugins
  plugins: "rabbitmq_management rabbitmq_peer_discovery_k8s"

# ============================================================================
# PERSISTENT VOLUMES FOR UPLOADS
# ============================================================================

persistence:
  enabled: true

  # Uploaded files storage
  uploads:
    size: 200Gi
    storageClass: standard-rwo
    accessMode: ReadWriteMany # Important for multi-pod access

  # Archived files storage
  archive:
    size: 100Gi
    storageClass: standard-rwo
    accessMode: ReadWriteOnce

# ============================================================================
# INVENIO APPLICATION CONFIGURATION
# ============================================================================

invenio:
  # Secret key for Flask (⚠️ use Secret in production!)
  secret_key: "CHANGE-ME-TO-RANDOM-STRING"

  # Security settings
  security:
    login_salt: "CHANGE-ME-RANDOM"

  # Site configuration
  site:
    name: "UNESCO Science Portal"
    url: "https://openscience.unesco.org"

  # Theme configuration
  theme:
    logo: "/static/images/unesco-logo.svg"
    primary_color: "#0056b3"

  # Email configuration (optional)
  mail:
    enabled: false
    server: "smtp.example.com"
    port: 587
    use_tls: true
    username: "noreply@unesco.org"
    default_sender: "UNESCO Science Portal <noreply@unesco.org>"

  # Rate limiting
  ratelimit:
    enabled: true
    storage_url: "redis://:PASSWORD@redis:6379/1"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================

# Extra environment variables from ConfigMap
extraEnvFrom:
  - configMapRef:
      name: unesco-rdm-config

# Extra environment variables from Secret
extraEnvFromSecret:
  - secretRef:
      name: unesco-rdm-secrets

# ============================================================================
# HEALTH CHECKS
# ============================================================================

livenessProbe:
  httpGet:
    path: /ping
    port: 5000
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ping
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ============================================================================
# SERVICE ACCOUNTS & RBAC
# ============================================================================

serviceAccount:
  # Create a service account
  create: true

  # Name of service account
  name: unesco-rdm

  # Annotations
  annotations: {}

rbac:
  # Create RBAC resources
  create: true

# ============================================================================
# SECURITY CONTEXT
# ============================================================================

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# ============================================================================
# NODE AFFINITY & TOLERATIONS
# ============================================================================

# Node affinity (optional - schedule on specific nodes)
affinity:
  {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: node-type
  #         operator: In
  #         values:
  #         - application

# Tolerations (optional - tolerate taints)
tolerations: []

# Node selector (optional - select specific nodes)
nodeSelector:
  {}
  # node-type: application

# ============================================================================
# POD DISRUPTION BUDGET
# ============================================================================

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ============================================================================
# MONITORING & OBSERVABILITY
# ============================================================================

# Prometheus monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

# Logging
logging:
  level: INFO
  format: json

# ============================================================================
# BACKUP CONFIGURATION
# ============================================================================

backup:
  enabled: false
  # Backup schedule (cron format)
  schedule: "0 2 * * *"
  # Retention days
  retention: 30
  # Backup storage
  storage:
    type: s3
    bucket: unesco-rdm-backups
    region: eu-west-1

# ============================================================================
# CUSTOM CONFIGURATION
# ============================================================================

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []

# Extra init containers
extraInitContainers: []

# Extra sidecar containers
extraContainers: []
