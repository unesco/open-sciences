# UNESCO Science Portal - Kind (Local K8s) Values
# Lightweight configuration for local development on Kind cluster
#
# Usage:
#   helm install unesco-rdm invenio/invenio -f k8s/values-kind.yaml
#

# ============================================================================
# IMAGE CONFIGURATION
# ============================================================================

image:
  # Local image (loaded into Kind cluster)
  repository: sc-openscience
  tag: "latest"
  pullPolicy: Never

# No registry credentials needed for local images
imagePullSecrets: []

# ============================================================================
# SCALING CONFIGURATION (Reduced for local)
# ============================================================================

replicaCount:
  web-ui: 1 # Single pod for UI
  web-api: 1 # Single pod for API
  worker: 1 # Single worker
  scheduler: 1 # Single scheduler

# ============================================================================
# RESOURCE LIMITS (Reduced for local)
# ============================================================================

resources:
  web-ui:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  web-api:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  worker:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

  scheduler:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"

# ============================================================================
# INGRESS CONFIGURATION (NodePort for Kind)
# ============================================================================

ingress:
  enabled: true
  className: nginx

  annotations:
    # No SSL for local development
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

  # No TLS for local
  tls: []

# ============================================================================
# POSTGRESQL DATABASE (Single node, minimal resources)
# ============================================================================

postgresql:
  enabled: true

  auth:
    username: invenio
    password: "invenio123" # Simple password for local dev
    database: invenio

  architecture: standalone

  primary:
    persistence:
      enabled: true
      size: 5Gi # Small for local
      storageClass: standard

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# ============================================================================
# OPENSEARCH (Single node, minimal resources)
# ============================================================================

opensearch:
  enabled: true

  clusterName: local-search

  # Single node for local
  replicas: 1

  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Minimal heap for local
  opensearchJavaOpts: "-Xms256m -Xmx256m"

  # Disable security for simplicity
  securityConfig:
    enabled: false

# ============================================================================
# REDIS (Minimal config)
# ============================================================================

redis:
  enabled: true
  architecture: standalone

  auth:
    enabled: false # Disabled for local simplicity

  master:
    persistence:
      enabled: false # No persistence for cache

    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"

# ============================================================================
# RABBITMQ (Minimal config)
# ============================================================================

rabbitmq:
  enabled: true

  auth:
    username: invenio
    password: "invenio123"
    erlangCookie: "local-cookie"

  clustering:
    enabled: false

  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

# ============================================================================
# PERSISTENT VOLUMES (Small sizes for local)
# ============================================================================

persistence:
  enabled: true

  uploads:
    size: 5Gi
    storageClass: standard
    accessMode: ReadWriteOnce

  archive:
    size: 2Gi
    storageClass: standard
    accessMode: ReadWriteOnce

# ============================================================================
# INVENIO CONFIGURATION
# ============================================================================

invenio:
  # REQUIRED: hostname for the application
  hostname: "localhost"

  # Use existing secret with credentials
  existingSecret: "unesco-rdm-secrets"

  secret_key: "local-dev-secret-key-change-in-production"

  security:
    login_salt: "local-dev-salt"

  site:
    name: "UNESCO Science Portal (Local)"
    url: "http://localhost"

  theme:
    logo: "/static/images/unesco-logo.svg"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================

# Environment from ConfigMap
env:
  - name: INVENIO_SITE_NAME
    value: "UNESCO Science Portal (Local)"
  - name: INVENIO_SITE_URL
    value: "http://localhost"
  - name: FLASK_ENV
    value: "development"
  - name: INVENIO_DEBUG
    value: "true"

# ============================================================================
# HEALTH CHECKS (Relaxed for local)
# ============================================================================

livenessProbe:
  httpGet:
    path: /ping
    port: 5000
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /ping
    port: 5000
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

# ============================================================================
# SERVICE ACCOUNT
# ============================================================================

serviceAccount:
  create: true
  name: unesco-rdm-local

# ============================================================================
# SECURITY CONTEXT (Permissive for local)
# ============================================================================

podSecurityContext:
  runAsNonRoot: false
  # runAsUser: 1000
  # fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false

# ============================================================================
# MONITORING (Disabled for local)
# ============================================================================

metrics:
  enabled: false

# ============================================================================
# POD DISRUPTION BUDGET (Disabled for local)
# ============================================================================

podDisruptionBudget:
  enabled: false

# ============================================================================
# BACKUP (Disabled for local)
# ============================================================================

backup:
  enabled: false
