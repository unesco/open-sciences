# Example: Injecting Environment Variables for Runtime Configuration
#
# With the new runtime configuration approach, invenio.cfg is generated when
# the container starts. All configuration values must be provided as environment
# variables in your Kubernetes/k3s deployment manifests.
#
# This file shows example patterns for different deployment methods.

# =============================================================================
# Option 1: Using Kubernetes Secret (RECOMMENDED for production)
# =============================================================================

# Create a Secret with all configuration variables:
# kubectl create secret generic invenio-config \
#   --from-env-file=deploy/.env.test \
#   --namespace=invenio

# Then reference it in your Deployment:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web
  namespace: invenio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invenio-web
  template:
    metadata:
      labels:
        app: invenio-web
    spec:
      containers:
      - name: web
        image: registry.repository.unesco.org/sc/sc-openscience:test
        envFrom:
        - secretRef:
            name: invenio-config
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

# =============================================================================
# Option 2: Using Helm values.yaml (for Helm charts)
# =============================================================================

# In your values.yaml:
# config:
#   ADMIN_EMAIL: "sasso@unicc.org"
#   DOMAIN: "open-science-test.unesco.org"
#   SITE_PROTOCOL: "https"
#   POSTGRES_USER: "invenio"
#   POSTGRES_DB: "invenio"
#   SECRET_KEY: "{{ .Values.secrets.secretKey }}"
#   # ... other variables from deploy/.env.test

# In your deployment template:
# env:
# {{- range $key, $value := .Values.config }}
# - name: {{ $key }}
#   value: {{ $value | quote }}
# {{- end }}

# =============================================================================
# Option 3: Direct env in Deployment (NOT recommended - for testing only)
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web-test
  namespace: invenio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invenio-web-test
  template:
    metadata:
      labels:
        app: invenio-web-test
    spec:
      containers:
      - name: web
        image: registry.repository.unesco.org/sc/sc-openscience:test
        env:
        # Admin configuration
        - name: ADMIN_EMAIL
          value: "sasso@unicc.org"
        - name: ADMIN_USER_EMAIL
          value: "sasso@unicc.org"
        - name: ADMIN_USER_PASSWORD
          value: "TestAdmin2026!"
        
        # Domain and protocol
        - name: DOMAIN
          value: "localhost"
        - name: SITE_PROTOCOL
          value: "http"
        
        # Database
        - name: POSTGRES_USER
          value: "invenio"
        - name: POSTGRES_DB
          value: "invenio"
        - name: POSTGRES_PASSWORD
          value: "invenio_test_db_pwd_2026_a1b2c3d4e5f6"
        
        # S3/MinIO
        - name: S3_ACCESS_KEY_ID
          value: "minioadmin"
        - name: S3_SECRET_ACCESS_KEY
          value: "minio_test_root_2026_k1j2h3g4f5d6"
        - name: S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: S3_BUCKET_NAME
          value: "invenio-test"
        - name: S3_REGION_NAME
          value: "us-east-1"
        
        # Secrets (CHANGE THESE IN PRODUCTION!)
        - name: SECRET_KEY
          value: "test1234567890abcdef1234567890abcdef1234567890abcdef1234567890ab"
        - name: SECURITY_LOGIN_SALT
          value: "salt1234567890abcdef1234567890abcdef1234567890abcdef1234567890ab"
        
        # ... (add all other variables from deploy/.env.test)
        
        ports:
        - containerPort: 5000

# =============================================================================
# Important Notes:
# =============================================================================
#
# 1. The docker-entrypoint.sh script validates that required variables are set
#    If any are missing, the container will fail to start with a clear error
#
# 2. Derived variables (SITE_UI_URL, SITE_API_URL, SQLALCHEMY_DATABASE_URI, etc.)
#    are computed automatically by the entrypoint script - you don't need to set them
#
# 3. For production deployments:
#    - Use Kubernetes Secrets for sensitive values
#    - Generate proper random values for SECRET_KEY and SECURITY_LOGIN_SALT
#    - Use SealedSecrets or external secret managers (Vault, etc.) for GitOps
#
# 4. All variables from deploy/.env.test must be provided as environment variables
#    See that file for the complete list of required and optional variables
#
# =============================================================================
