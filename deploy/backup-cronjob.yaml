# ==============================================================================
# UNESCO Open Science Portal - Automated Backup CronJob
# ==============================================================================
# Runs daily backups of:
#   1. PostgreSQL database (pg_dump)
#   2. InvenioRDM uploaded files
#
# Backups are stored on the host at ${BACKUP_DIR} (default: /opt/backups/unesco-rdm)
# with automatic rotation (default: 30 days retention).
#
# Usage:
#   kubectl apply -f backup-cronjob.yaml
#
# Manual trigger:
#   kubectl create job --from=cronjob/unesco-rdm-backup manual-backup-$(date +%s) -n unesco-rdm
# ==============================================================================

---
# PVC for backup storage (mounted from host)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: backup-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  hostPath:
    path: /opt/backups/unesco-rdm
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: unesco-rdm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 50Gi

---
# ConfigMap with backup script
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: unesco-rdm
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_BASE="/backups"
    DB_BACKUP_DIR="${BACKUP_BASE}/db"
    FILES_BACKUP_DIR="${BACKUP_BASE}/files"
    RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-30}"

    echo "=========================================="
    echo "UNESCO Open Science Portal - Backup"
    echo "Timestamp: ${TIMESTAMP}"
    echo "=========================================="

    # Create backup directories
    mkdir -p "${DB_BACKUP_DIR}" "${FILES_BACKUP_DIR}"

    # 1. Database backup
    echo ""
    echo "[1/3] Backing up PostgreSQL database..."
    PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
      -h postgresql \
      -U "${POSTGRES_USER}" \
      -d "${POSTGRES_DB}" \
      --format=custom \
      --compress=9 \
      --file="${DB_BACKUP_DIR}/db_${TIMESTAMP}.dump"

    DB_SIZE=$(du -sh "${DB_BACKUP_DIR}/db_${TIMESTAMP}.dump" | cut -f1)
    echo "  Database backup: ${DB_SIZE} -> db_${TIMESTAMP}.dump"

    # 2. Create a manifest
    echo ""
    echo "[2/3] Creating backup manifest..."
    cat > "${BACKUP_BASE}/manifest_${TIMESTAMP}.json" <<EOF
    {
      "timestamp": "${TIMESTAMP}",
      "type": "scheduled",
      "database": {
        "file": "db/db_${TIMESTAMP}.dump",
        "format": "pg_dump custom",
        "host": "postgresql",
        "database": "${POSTGRES_DB}"
      },
      "retention_days": ${RETENTION_DAYS}
    }
    EOF

    # 3. Cleanup old backups
    echo ""
    echo "[3/3] Cleaning up backups older than ${RETENTION_DAYS} days..."
    DELETED_COUNT=0

    # Clean old DB dumps
    find "${DB_BACKUP_DIR}" -name "db_*.dump" -mtime +${RETENTION_DAYS} -print -delete | while read f; do
      echo "  Deleted: $(basename $f)"
      DELETED_COUNT=$((DELETED_COUNT + 1))
    done

    # Clean old manifests
    find "${BACKUP_BASE}" -name "manifest_*.json" -mtime +${RETENTION_DAYS} -delete

    echo ""
    echo "=========================================="
    echo "Backup completed successfully!"
    echo "  Database: ${DB_BACKUP_DIR}/db_${TIMESTAMP}.dump (${DB_SIZE})"
    echo "  Manifest: manifest_${TIMESTAMP}.json"
    echo "=========================================="

    # List recent backups
    echo ""
    echo "Recent backups:"
    ls -lht "${DB_BACKUP_DIR}" | head -6

---
# CronJob for automated backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unesco-rdm-backup
  namespace: unesco-rdm
  labels:
    app: unesco-rdm
    component: backup
spec:
  # Default: daily at 2:00 AM UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 minutes max
      template:
        metadata:
          labels:
            app: unesco-rdm
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:15
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: unesco-rdm-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: unesco-rdm-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: unesco-rdm-secrets
                      key: POSTGRES_DB
                - name: BACKUP_RETENTION_DAYS
                  value: "30"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: backup-script
                  mountPath: /scripts
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "250m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: backup-script
              configMap:
                name: backup-script
                defaultMode: 0755
