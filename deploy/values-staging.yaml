# ==============================================================================
# UNESCO Open Science Portal - Helm Values (Staging Override)
# ==============================================================================
# Override values for staging/dev environments.
#
# Usage:
#   helm upgrade --install unesco-rdm invenio/invenio \
#     --namespace unesco-rdm \
#     --values values.yaml \
#     --values values-staging.yaml
# ==============================================================================

# Staging uses fewer resources and a single web replica
web:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

worker:
  replicas: 1
  concurrency: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

workerBeat:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"

# Smaller persistence for staging
persistence:
  size: 10Gi
