# InvenioRDM Scripts Microservice
# Additional Docker Compose configuration for the Python API scripts service

services:
  scripts:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: invenio-scripts
    env_file:
      - ./scripts/config/.env
    volumes:
      # Mount config directory for environment files
      - ./scripts/config:/app/config:ro
      # Mount data directory for CSV files
      - ./scripts/data:/app/data:rw
      # Mount a volume for file uploads (optional)
      - ./uploads:/app/uploads:ro
    networks:
      - default
    restart: unless-stopped
    # Interactive mode for development
    stdin_open: true
    tty: true
    # Default command shows help
    command: ["python", "main.py"]

  # Alternative service for running specific scripts
  scripts-cli:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: invenio-scripts-cli
    env_file:
      - ./scripts/config/.env
    volumes:
      - ./scripts/config:/app/config:ro
      - ./scripts/data:/app/data:rw
      - ./uploads:/app/uploads:ro
    network_mode: host
    # This service is designed to be run with specific commands
    # Example: docker-compose -f docker-compose.scripts.yml run scripts-cli python examples/search_records.py -q "test"

# Optional volumes for data persistence
volumes:
  scripts_data:
    driver: local
