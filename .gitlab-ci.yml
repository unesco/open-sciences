# GitLab CI/CD Pipeline for openscience_tools package
# Builds, tests, and publishes the package to GitLab Package Registry

stages:
  # SECTION: Custom stages for openscience_tools package
  - ost_prepare
  - ost_build
  - ost_publish
  # !SECTION
  # SECTION: k3s deployment pipeline
  - build
  - render
  - deploy
  # !SECTION

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PACKAGE_NAME: "openscience_tools"
  PACKAGE_VERSION: "0.2.5"
  # Increase pip timeout and retries for network issues
  PIP_DEFAULT_TIMEOUT: "100"
  PIP_RETRIES: "5"

cache:
  paths:
    - .cache/pip
    - .venv/

# Prepare stage - Build custom Docker image with twine pre-installed
ost_build_publish_image:
  stage: ost_prepare
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}/ost-publish-tool:latest
    # UNESCO proxy configuration for external internet access
    HTTP_PROXY: "http://proxy.unesco.org:8080"
    HTTPS_PROXY: "http://proxy.unesco.org:8080"
    http_proxy: "http://proxy.unesco.org:8080"
    https_proxy: "http://proxy.unesco.org:8080"
    # Don't use proxy for UNESCO and local domains
    NO_PROXY: "localhost,127.0.0.1,docker,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
    no_proxy: "localhost,127.0.0.1,docker,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
    # Disable TLS for Docker-in-Docker (standard for ephemeral CI environments)
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # Give Docker daemon a moment to fully initialize
    - sleep 5
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building custom publish image with twine..."
    # Build with proxy arguments to allow package installation from PyPI
    - docker build --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY --build-arg NO_PROXY=$NO_PROXY -f .gitlab/Dockerfile.ost -t ${DOCKER_IMAGE} .
    - echo "Pushing image to registry..."
    - docker push ${DOCKER_IMAGE}
    - echo "Publish image ready at ${DOCKER_IMAGE}"
  only:
    - ost

# Build stage - Create distribution packages
ost_build:
  stage: ost_build
  image: python:3.11
  needs:
    - job: ost_build_publish_image
  # Disable cache to ensure fresh build with new package structure
  cache: {}
  variables:
    # UNESCO proxy configuration (may be needed for some operations)
    HTTP_PROXY: "http://proxy.unesco.org:8080"
    HTTPS_PROXY: "http://proxy.unesco.org:8080"
    http_proxy: "http://proxy.unesco.org:8080"
    https_proxy: "http://proxy.unesco.org:8080"
    NO_PROXY: "localhost,127.0.0.1,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
    no_proxy: "localhost,127.0.0.1,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - cd openscience_tools
    - echo "Verifying package structure..."
    - ls -la | grep openscience_tools || echo "WARNING openscience_tools directory not found"
    - echo "Using pre-installed Python build tools"
    - python -m pip --version || echo "pip available"
    - python -c "import setuptools; print(f'setuptools {setuptools.__version__}')" || echo "setuptools available"
  script:
    - echo "Building package..."
    - python -m build --no-isolation 2>&1 || python setup.py sdist bdist_wheel
    - ls -lh dist/
    - echo "Verifying built package metadata..."
    - tar -xzf dist/openscience_tools-${PACKAGE_VERSION}.tar.gz openscience_tools-${PACKAGE_VERSION}/PKG-INFO 2>/dev/null || true
    - cat openscience_tools-${PACKAGE_VERSION}/PKG-INFO 2>/dev/null | head -10 || echo "Could not extract PKG-INFO"
    - echo "Package built successfully!"
  artifacts:
    paths:
      - openscience_tools/dist/
    expire_in: 1 week
  only:
    - ost

# Publish stage - Upload to GitLab Package Registry (manual trigger only)
ost_publish:
  stage: ost_publish
  # Use custom image with twine pre-installed to bypass runner network issues
  image: ${CI_REGISTRY_IMAGE}/ost-publish-tool:latest
  needs:
    - job: ost_build
      artifacts: true
  retry:
    max: 2
    when:
      - script_failure
  variables:
    TWINE_USERNAME: gitlab-ci-token
    TWINE_PASSWORD: ${CI_JOB_TOKEN}
  before_script:
    - cd openscience_tools
    - ls -lh dist/
    - echo "Verifying twine installation..."
    - python -m twine --version
    - echo "Checking package metadata before upload..."
    - echo "=== Checking tarball ==="
    - tar -xzf dist/openscience_tools-${PACKAGE_VERSION}.tar.gz openscience_tools-${PACKAGE_VERSION}/PKG-INFO
    - cat openscience_tools-${PACKAGE_VERSION}/PKG-INFO | head -15
    - echo "=== Checking wheel ==="
    - python -m zipfile -e dist/openscience_tools-${PACKAGE_VERSION}-py3-none-any.whl /tmp/wheel_check
    - cat /tmp/wheel_check/openscience_tools-${PACKAGE_VERSION}.dist-info/METADATA | head -15 || echo "METADATA not found in wheel"
    - echo "=== Running twine check ==="
    - python -m twine check dist/*
  script:
    - echo "Publishing package to GitLab Package Registry..."
    - python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
    - echo ""
    - echo "Package published successfully!"
    - echo ""
    - echo "Install with:"
    - echo "   pip install openscience_tools --index-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi/simple"
  artifacts:
    paths:
      - openscience_tools/dist/
  only:
    - ost

# ==============================================================================
# K3s Deployment Pipeline
# ==============================================================================
# Stage 1: Build and push Docker image
# Stage 2: Render invenio.cfg from template (1-minute artifact)
# Stage 3: Upload config as Secret to k8s cluster (requires KUBECONFIG)
# ==============================================================================

build:docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  environment:
    name: test
  variables:
    # Proxy UNESCO (uppercase and lowercase for compatibility)
    HTTP_PROXY: "http://proxy.unesco.org:8080"
    HTTPS_PROXY: "http://proxy.unesco.org:8080"
    http_proxy: "http://proxy.unesco.org:8080"
    https_proxy: "http://proxy.unesco.org:8080"
    # No proxy for UNESCO domains and GitLab registry
    NO_PROXY: "localhost,127.0.0.1,docker,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
    no_proxy: "localhost,127.0.0.1,docker,*.unesco.org,unesco.org,repository.unesco.org,registry.gitlab.com"
    # Docker-in-Docker configuration
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_IMAGE: "${CI_REGISTRY_IMAGE}"
  before_script:
    # Wait for Docker daemon to be ready
    - sleep 5
    - echo "Logging in to GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "==================================================================="
    - echo "Building InvenioRDM Docker image"
    - echo "==================================================================="
    - 'echo "Image: ${DOCKER_IMAGE}"'
    - 'echo "Tags: test, ${CI_COMMIT_SHORT_SHA}"'
    - 'echo "Context: repository root"'
    - 'echo "Dockerfile: deploy/Dockerfile"'
    - 'echo "Config strategy: Runtime generation from template"'
    - echo ""
    - echo "Building image..."
    - docker build --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY --build-arg NO_PROXY=$NO_PROXY -f deploy/Dockerfile -t $DOCKER_IMAGE:test -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA .
    - echo ""
    - echo "Pushing image tags to registry..."
    - docker push $DOCKER_IMAGE:test
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - echo ""
    - echo "==================================================================="
    - echo "Docker image built and pushed successfully!"
    - echo "==================================================================="
    - 'echo "Available at:"'
    - 'echo "  - ${DOCKER_IMAGE}:test"'
    - 'echo "  - ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}"'
    - echo ""
    - 'echo "NOTE: invenio.cfg will be generated at container startup from template"'
    - 'echo "      Ensure all required env vars are set in k8s/k3s deployment"'
  only:
    - test

