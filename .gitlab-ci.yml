# ------------------------------------------------------------------------------
# Deploy: Write .env.tmp to server via SSH
# ------------------------------------------------------------------------------
# Writes a .env.tmp file on the deployment server using CI/CD variables.
# This file can then be reviewed and applied with:
#   cp .env.tmp .env.test && make deploy ENV=test
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   SSH_PRIVATE_KEY        - Private key to SSH into the server (type: File)
#   DEPLOY_HOST            - Server IP/hostname (e.g. 193.242.192.169)
#   DEPLOY_USER            - SSH user (e.g. unicc)
#   DEPLOY_PATH            - Repo path on server (e.g. /opt/sc-openscience)
#   DOMAIN                 - Site domain
#   SITE_PROTOCOL          - http or https
#   ADMIN_EMAIL            - Admin email
#   ADMIN_USER_EMAIL       - Admin login email
#   ADMIN_USER_PASSWORD    - Admin login password (masked)
#   SECRET_KEY             - Flask secret key (masked)
#   SECURITY_LOGIN_SALT    - Flask login salt (masked)
#   POSTGRES_USER          - PostgreSQL username
#   POSTGRES_PASSWORD      - PostgreSQL password (masked)
#   POSTGRES_DB            - PostgreSQL database name
#   RABBITMQ_USER          - RabbitMQ username
#   RABBITMQ_PASSWORD      - RabbitMQ password (masked)
#   MINIO_ROOT_USER        - MinIO root user
#   MINIO_ROOT_PASSWORD    - MinIO root password (masked)
#   REGISTRY_USER          - Container registry user
#   REGISTRY_PASSWORD      - Container registry token (masked)
#   SEARCH_INDEX_PREFIX    - OpenSearch index prefix (e.g. test-)
# ------------------------------------------------------------------------------
deploy:env:
  stage: deploy
  image: alpine:latest
  environment:
    name: test
  needs: [] # No dependency — run independently (re-enable build:docker later)
  variables:
    # Proxy for apk install
    HTTP_PROXY: "http://proxy.unesco.org:8080"
    HTTPS_PROXY: "http://proxy.unesco.org:8080"
    http_proxy: "http://proxy.unesco.org:8080"
    https_proxy: "http://proxy.unesco.org:8080"
    NO_PROXY: "localhost,127.0.0.1,*.unesco.org,unesco.org"
    no_proxy: "localhost,127.0.0.1,*.unesco.org,unesco.org"
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    # Decode base64 encoded SSH key and add to agent (same pattern as deploy_staging/deploy_production)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - echo "==================================================================="
    - echo "Writing .env.tmp to ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
    - echo "==================================================================="
    - |
      # Build .env.tmp content from CI/CD variables
      cat > /tmp/.env.tmp << ENVEOF
      # Generated by GitLab CI/CD pipeline
      # Job: ${CI_JOB_ID} | Commit: ${CI_COMMIT_SHORT_SHA}
      # Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      #
      # Review and apply with:
      #   cp .env.tmp .env.test && make deploy ENV=test
      ADMIN_EMAIL=${ADMIN_EMAIL}
      ADMIN_USER_EMAIL=${ADMIN_USER_EMAIL}
      ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      APP_ENABLE_SECURE_HEADERS=${APP_ENABLE_SECURE_HEADERS:-False}
      BACKUP_PATH=${BACKUP_PATH:-backups/test}
      BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-3}
      BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_STORAGE_SIZE=${BACKUP_STORAGE_SIZE:-50Gi}
      DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME:-sc/sc-openscience}
      DOCKER_IMAGE_TAG=${DOCKER_IMAGE_TAG:-test}
      DOCKER_REGISTRY=${DOCKER_REGISTRY:-registry.repository.unesco.org}
      DOMAIN=${DOMAIN}
      FILES_REST_DEFAULT_STORAGE_CLASS=${FILES_REST_DEFAULT_STORAGE_CLASS:-S}
      FILES_REST_STORAGE_FACTORY=${FILES_REST_STORAGE_FACTORY:-invenio_s3.s3fs_storage_factory}
      FORCE_HTTPS=${FORCE_HTTPS:-False}
      IMAGE_PULL_POLICY=${IMAGE_PULL_POLICY:-Always}
      IMAGE_REGISTRY=${IMAGE_REGISTRY:-registry.repository.unesco.org}
      INGRESS_ENTRYPOINT=${INGRESS_ENTRYPOINT:-web}
      INGRESS_TLS_ENABLED=${INGRESS_TLS_ENABLED:-false}
      INVENIO_REQUIRE_HTTPS=${INVENIO_REQUIRE_HTTPS:-False}
      LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@localhost}
      MAIL_PASSWORD=${MAIL_PASSWORD:-}
      MAIL_PORT=${MAIL_PORT:-25}
      MAIL_SERVER=${MAIL_SERVER:-localhost}
      MAIL_USERNAME=${MAIL_USERNAME:-}
      MAIL_USE_TLS=${MAIL_USE_TLS:-false}
      MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      MINIO_ROOT_USER=${MINIO_ROOT_USER}
      OAISERVER_ADMIN_EMAIL=${OAISERVER_ADMIN_EMAIL:-${ADMIN_EMAIL}}
      OAISERVER_ID_PREFIX=${OAISERVER_ID_PREFIX:-${DOMAIN}}
      POSTGRES_DB=${POSTGRES_DB}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_USER=${POSTGRES_USER}
      RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      RABBITMQ_USER=${RABBITMQ_USER}
      REGISTRY_PASSWORD=${REGISTRY_PASSWORD}
      REGISTRY_USER=${REGISTRY_USER:-oauth2}
      S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER}}
      S3_BUCKET_NAME=${S3_BUCKET_NAME:-invenio-test}
      S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      SEARCH_INDEX_PREFIX=${SEARCH_INDEX_PREFIX}
      SECRET_KEY=${SECRET_KEY}
      SECURITY_LOGIN_SALT=${SECURITY_LOGIN_SALT}
      SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      SITE_PROTOCOL=${SITE_PROTOCOL:-http}
      STRICT_TRANSPORT_SECURITY=${STRICT_TRANSPORT_SECURITY:-False}
      TLS_MODE=${TLS_MODE:-none}
      UWSGI_PROCESSES=${UWSGI_PROCESSES:-2}
      UWSGI_THREADS=${UWSGI_THREADS:-2}
      WEB_CPU_LIMIT=${WEB_CPU_LIMIT:-1000m}
      WEB_CPU_REQUEST=${WEB_CPU_REQUEST:-250m}
      WEB_MEMORY_LIMIT=${WEB_MEMORY_LIMIT:-2Gi}
      WEB_MEMORY_REQUEST=${WEB_MEMORY_REQUEST:-512Mi}
      WEB_REPLICAS=${WEB_REPLICAS:-1}
      WORKER_CPU_LIMIT=${WORKER_CPU_LIMIT:-500m}
      WORKER_CPU_REQUEST=${WORKER_CPU_REQUEST:-250m}
      WORKER_MEMORY_LIMIT=${WORKER_MEMORY_LIMIT:-1Gi}
      WORKER_MEMORY_REQUEST=${WORKER_MEMORY_REQUEST:-512Mi}
      WORKER_REPLICAS=${WORKER_REPLICAS:-1}
      ENVEOF
    - |
      # Remove leading whitespace (heredoc indentation)
      sed -i 's/^      //' /tmp/.env.tmp
    - echo ""
    - echo "Uploading .env.tmp to server..."
    - scp -o StrictHostKeyChecking=no /tmp/.env.tmp "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/deploy/.env.tmp"
    - echo ""
    - |
      echo "==================================================================="
      echo ".env.tmp written to ${DEPLOY_PATH}/deploy/.env.tmp"
      echo "To apply: ssh ${DEPLOY_USER}@${DEPLOY_HOST}"
      echo "  cd ${DEPLOY_PATH}/deploy"
      echo "  diff .env.tmp .env.test   # review changes"
      echo "  cp .env.tmp .env.test     # apply"
      echo "  make deploy ENV=test      # deploy"
      echo "==================================================================="
    - rm -f /tmp/.env.tmp
  only:
    - test
  when: manual
