# GitLab CI/CD Pipeline for openscience-tools package
# Builds, tests, and publishes the package to GitLab Package Registry

stages:
  - test
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PACKAGE_NAME: "openscience-tools"
  PACKAGE_VERSION: "0.1.0"

cache:
  paths:
    - .cache/pip
    - .venv/

# Test stage - Run tests and linting
test:
  stage: test
  image: python:3.11
  before_script:
    - cd openscience-tools
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - echo "Running tests..."
    # Uncomment when tests are available
    # - pytest tests/ -v --cov=openscience_tools
    - echo "Running linting..."
    - black --check src/
    - isort --check-only src/
    # - flake8 src/
  only:
    - branches
    - tags
  except:
    - schedules

# Build stage - Create distribution packages
build:
  stage: build
  image: python:3.11
  before_script:
    - cd openscience-tools
    - pip install --upgrade pip build
  script:
    - echo "Building package..."
    - python -m build
    - ls -lh dist/
  artifacts:
    paths:
      - openscience-tools/dist/
    expire_in: 1 week
  only:
    - branches
    - tags

# Publish stage - Upload to GitLab Package Registry (manual trigger only)
publish:
  stage: publish
  image: python:3.11
  before_script:
    - cd openscience-tools
    - pip install --upgrade pip twine
  script:
    - echo "Publishing package to GitLab Package Registry..."
    - |
      TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload \
        --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi \
        dist/*
    - echo "Package published successfully!"
    - echo "Install with pip install openscience-tools --index-url https://repository.unesco.org/api/v4/projects/${CI_PROJECT_ID}/packages/pypi/simple"
  artifacts:
    paths:
      - openscience-tools/dist/
  when: manual # Always require manual trigger
  only:
    - branches
    - tags
