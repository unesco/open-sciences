# InvenioRDM OpenScience Tools - Kind Cluster Configuration
# Docker Compose configuration for tools connecting to Kind cluster

services:
  openscience-tools-cli:
    build:
      context: ./openscience-tools
      dockerfile: Dockerfile
    container_name: invenio-openscience-tools-kind-cli
    env_file:
      - ./openscience-tools/config/.env.kind
    volumes:
      - ./openscience-tools/config:/app/config:ro
      - ./openscience-tools/src:/app/src:ro
      - ./uploads:/app/uploads:ro
      # Mount entire project root for access to all data files
      - .:/project:ro
    working_dir: /app
    network_mode: host
    # This service is designed to be run with specific commands
    # Example: docker-compose -f docker-compose.openscience-tools.kind.yml run openscience-tools-cli python -m src.sources.lens --file src/sources/lens/data/publications.json
