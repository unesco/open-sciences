# Apache configuration for serving Drupal under /cms subdirectory  
# This file should be placed in /etc/apache2/conf.d/
# The symlink /var/www/html/cms -> /var/www/web is created in the Dockerfile

<Directory /var/www/html/cms>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php index.html
</Directory>
