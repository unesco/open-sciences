# Apache configuration for serving Drupal under /cms subdirectory
# This file should be placed in /etc/apache2/conf.d/
# The symlink /var/www/html/cms -> /var/www/web is created in the Dockerfile
# Note: mod_headers is already loaded by the base lap83-alpine image.

<Directory /var/www/html/cms>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php index.html

    # CORS headers — allow the InvenioRDM dev server and any same-host nginx proxy
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT, PATCH"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-Requested-With"

    # Respond to preflight OPTIONS requests immediately
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^ - [R=204,L]
</Directory>