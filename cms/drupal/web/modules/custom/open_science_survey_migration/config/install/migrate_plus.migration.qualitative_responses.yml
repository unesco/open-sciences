id: qualitative_responses
label: 'Qualitative Responses'
migration_group: open_science_survey
migration_dependencies:
  required:
    - countries
    - survey_questions
source:
  plugin: csv
  path: 'modules/custom/open_science_survey_migration/data/qualitative_responses.csv'
  header_row_count: 1
  ids:
    - country
    - question_number

destination:
  plugin: entity:survey_response
  default_bundle: survey_response

process:
  field_survey_response_question:
    plugin: entity_lookup
    source: question_number
    entity_type: taxonomy_term
    value_key: field_question_number
    bundle_key: vid
    bundle: survey_question
    ignore_case: true
  field_survey_response_country:
    plugin: entity_lookup
    source: country
    entity_type: taxonomy_term
    value_key: field_iso_alpha3_code
    bundle_key: vid
    bundle: countries
    ignore_case: true
  field_survey_response_open_ans:
    plugin: get
    source: response
  field_open_ans_translated:
    plugin: static_map
    source: Translated
    map:
      'Y': true
      'N': false
    default_value: false