open_science_survey_search.settings:
  path: '/admin/config/search/opensearch-settings'
  defaults:
    _form: '\Drupal\open_science_survey_search\Form\OpenSearchSettingsForm'
    _title: 'OpenSearch Analyzer Settings'
  requirements:
    _permission: 'administer search_api'

open_science_survey_search.term_context:
  path: '/api/term-context'
  defaults:
    _controller: '\Drupal\open_science_survey_search\Controller\WordCloudController::termContext'
  methods: [GET]
  requirements:
    _access: 'TRUE'
