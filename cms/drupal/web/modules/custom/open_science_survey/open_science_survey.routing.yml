open_science_survey.wordcloud_challenges:
  path: '/api/wordcloud'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\WordCloudController::wordcloud'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.survey_questions:
  path: '/api/survey-questions'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\SurveyQuestionsController::listSurveyQuestions'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.multi_filter:
  path: '/api/search/survey-responses-multi-filter'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\MultiFilterSearchController::search'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.multi_filter_download:
  path: '/api/download/survey-responses-multi-filter'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\MultiFilterSearchController::download'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.term_context_csv:
  path: '/api/download/term-context'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\TermContextController::termContextCsv'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.term_context:
  path: '/api/term-context'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\TermContextController::termContext'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.pls_list:
  path: '/api/pls'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\PlsController::listpls'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.pls_detail:
  path: '/api/pls/{nid}'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\PlsController::detailpls'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    nid: '\d+'

open_science_survey.homepage_header:
  path: '/api/homepage/header'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::header'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.homepage_footer:
  path: '/api/homepage/footer'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::footer'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.homepage_cards:
  path: '/api/homepage/cards'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::cards'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.homepage_partners:
  path: '/api/homepage/partners'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::partners'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.page:
  path: '/api/pages/{page_path}'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::page'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    page_path: '[^/]+'

open_science_survey.page_nested:
  path: '/api/pages/{page_path}/{page_subpath}'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::page'
  methods: [GET]
  options:
    parameters:
      page_subpath:
        type: 'path'
  requirements:
    _access: 'TRUE'
    page_path: '[^/]+'
    page_subpath: '.+'

open_science_survey.page_node:
  path: '/api/pages/node/{nid}'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\HomepageController::pagebynid'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    nid: '\d+'
