open_science_survey.wordcloud_challenges:
  path: '/api/wordcloud'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\WordCloudController::wordcloud'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.survey_questions:
  path: '/api/survey-questions'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\SurveyQuestionsController::listSurveyQuestions'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.multi_filter:
  path: '/api/search/survey-responses-multi-filter'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\MultiFilterSearchController::search'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.multi_filter_download:
  path: '/api/download/survey-responses-multi-filter'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\MultiFilterSearchController::download'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.term_context_csv:
  path: '/api/download/term-context'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\TermContextController::termContextCsv'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.term_context:
  path: '/api/term-context'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\TermContextController::termContext'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.pls_list:
  path: '/api/pls'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\PlsController::listpls'
  methods: [GET]
  requirements:
    _access: 'TRUE'

open_science_survey.pls_detail:
  path: '/api/pls/{nid}'
  defaults:
    _controller: '\Drupal\open_science_survey\Controller\PlsController::detailpls'
  methods: [GET]
  requirements:
    _access: 'TRUE'
    nid: '\d+'
