# InvenioRDM Scripts Microservice - Kind Cluster Configuration
# Docker Compose configuration for scripts connecting to Kind cluster

services:
  scripts-cli:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: invenio-scripts-kind-cli
    env_file:
      - ./scripts/config/.env.kind
    volumes:
      - ./scripts/config:/app/config:ro
      - ./scripts/src:/app/src:ro
      - ./scripts/examples:/app/examples:ro
      - ./uploads:/app/uploads:ro
      # Mount entire project root for access to all data files
      - .:/project:ro
    working_dir: /app
    network_mode: host
    # This service is designed to be run with specific commands
    # Example: docker-compose -f docker-compose.scripts.kind.yml run scripts-cli python -m src.sources.lens --file src/sources/lens/data/publications.json
